<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a6b8a" />
    <title>Honey Island Defense</title>
    <meta name="description" content="ハチミツを守れ！可愛い3Dボクセル孤島ディフェンスゲーム" />
    <meta property="og:title" content="Honey Island Defense" />
    <meta property="og:description" content="ハチミツを守れ！可愛い3Dボクセル孤島ディフェンスゲーム" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shuji.anshin.kids/" />
    <meta property="og:image" content="https://shuji.anshin.kids/assets/ogp.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://shuji.anshin.kids/assets/ogp.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 3D game renders into this container -->
    <div id="game-container"></div>
    <div id="transition-overlay"></div>

    <!-- ══════ Title Screen ══════ -->
    <div id="title-screen">
      <div class="title-inner">
        <div class="title-donut-emoji">🍯</div>
        <h1 class="title-logo">HONEY<br>ISLAND</h1>
        <p class="title-sub">ハチミツをまもれ！🐝</p>
        <p class="title-highscore">BEST SCORE: <span id="title-high">0</span></p>
        <button id="title-start" class="title-start-btn">TAP TO START</button>
      </div>
    </div>

    <!-- ══════ In-Game HUD ══════ -->
    <div id="game-hud">
      <div class="hud-top">
        <div class="hud-score-box">
          <span class="hud-label">SCORE</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-time-box">
          <span class="hud-label">🍯 TIME</span>
          <span class="hud-value" id="hud-time">0.0s</span>
        </div>
      </div>
      <div class="hud-bottom">
        <div class="hud-gauge">
          <div class="hud-gauge-fill" id="hud-gauge-fill"></div>
        </div>
        <button id="hud-blast-btn" class="hud-blast-btn">🍩 0/3</button>
      </div>
    </div>

    <!-- ══════ Game Result Screen ══════ -->
    <div id="game-result">
      <div class="result-inner donut-result">
        <p class="donut-title">GAME<br>OVER</p>
        <div class="donut-stats">
          <div class="donut-stat">
            <span class="donut-stat-label">SCORE</span>
            <span class="donut-stat-value" id="result-score">0</span>
          </div>
          <div class="donut-stat">
            <span class="donut-stat-label">TIME</span>
            <span class="donut-stat-value" id="result-time">0s</span>
          </div>
          <div class="donut-stat">
            <span class="donut-stat-label">LEVEL</span>
            <span class="donut-stat-value" id="result-wave">1</span>
          </div>
        </div>
        <p class="donut-new" id="result-new">🍯 NEW RECORD 🍯</p>
        <p class="donut-high">BEST SCORE: <span id="result-high">0</span></p>
        <p class="result-gate-msg" id="result-gate-msg"></p>
        <!-- Name Input for TOP 10 -->
        <div id="lb-name-input-area">
          <p class="lb-qualify">🎉 TOP 10 入り！名前を登録</p>
          <div class="lb-input-row">
            <input id="lb-name" type="text" maxlength="8" placeholder="なまえ（8文字以内）" autocomplete="off" />
            <button id="lb-submit-btn" class="donut-btn lb-submit">登録</button>
          </div>
        </div>
        <div class="result-buttons">
          <button id="game-replay" class="donut-btn">RETRY</button>
          <button id="game-ranking-btn" class="donut-btn donut-btn-rank">🏆 RANKING</button>
          <button id="game-exit" class="donut-btn donut-btn-exit">EXIT</button>
        </div>
      </div>
    </div>

    <!-- ══════ In-Game Exit Button ══════ -->
    <button id="game-exit-ingame" class="game-exit-btn" aria-label="Exit game">✕</button>

    <!-- ══════ Leaderboard Panel ══════ -->
    <div id="leaderboard-panel">
      <div class="lb-inner">
        <div class="lb-header">
          <h2 class="lb-title">🏆 RANKING</h2>
          <button id="lb-close" class="lb-close-btn">✕</button>
        </div>
        <div class="lb-tabs">
          <button class="lb-tab active" data-tab="alltime">ALL TIME</button>
          <button class="lb-tab" data-tab="today">TODAY</button>
        </div>
        <table class="lb-table">
          <thead><tr><th></th><th>NAME</th><th>SCORE</th><th>WAVE</th><th>DATE</th></tr></thead>
          <tbody id="lb-tbody"></tbody>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="game.js?v=4"></script>
    <script src="leaderboard.js?v=4"></script>
    <script src="app.js?v=4"></script>
    <script>
      // Force clear old service worker caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    </script>
  </body>
</html>
