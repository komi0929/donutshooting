<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a6b8a" />
    <title>Honey Island Defense</title>
    <meta name="description" content="ハチミツを守れ！30秒3Dボクセル孤島ディフェンスゲーム" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container"></div>

    <!-- ══════ Title Screen ══════ -->
    <div id="title-screen">
      <div class="title-inner">
        <div class="title-donut-emoji">🍯</div>
        <h1 class="title-logo">HONEY<br>ISLAND</h1>
        <p class="title-sub">30秒でどれだけ守れる？🐝</p>
        <p class="title-highscore">BEST SCORE: <span id="title-high">0</span></p>
        <button id="title-start" class="title-start-btn">TAP TO START</button>
      </div>
    </div>

    <!-- ══════ In-Game HUD ══════ -->
    <div id="game-hud">
      <div class="hud-top">
        <div class="hud-score-box">
          <span class="hud-label">SCORE</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-time-box">
          <span class="hud-label">⏰ TIME</span>
          <span class="hud-value" id="hud-time">30s</span>
        </div>
      </div>
      <div class="hud-timer-wrap">
        <div class="hud-timer-bar" id="hud-timer-bar"></div>
      </div>
      <div class="hud-honey-wrap">
        <span class="hud-honey-label">🍯</span>
        <div class="hud-honey-bar"><div class="hud-honey-fill" id="hud-honey"></div></div>
      </div>
      <div class="hud-bottom">
        <div class="hud-gauge">
          <div class="hud-gauge-fill" id="hud-gauge-fill"></div>
        </div>
        <button id="hud-blast-btn" class="hud-blast-btn">🍩 0/3</button>
      </div>
    </div>

    <!-- ══════ Game Result Screen ══════ -->
    <div id="game-result">
      <div class="result-inner">
        <p class="result-title">TIME UP!</p>
        <div class="result-score-main">
          <span class="result-score-label">SCORE</span>
          <span class="result-score-value" id="result-score">0</span>
        </div>
        <div class="result-stats">
          <div class="result-stat">
            <span class="result-stat-icon">🐝</span>
            <span class="result-stat-val" id="result-bees">0</span>
            <span class="result-stat-lbl">repelled</span>
          </div>
          <div class="result-stat">
            <span class="result-stat-icon">🍩</span>
            <span class="result-stat-val" id="result-donuts">0</span>
            <span class="result-stat-lbl">collected</span>
          </div>
          <div class="result-stat">
            <span class="result-stat-icon">🍯</span>
            <span class="result-stat-val" id="result-honey">100%</span>
            <span class="result-stat-lbl">remaining</span>
          </div>
        </div>
        <p class="result-new" id="result-new">🍯 NEW RECORD! 🍯</p>
        <p class="result-best">BEST: <span id="result-high">0</span></p>
        <span id="result-time" style="display:none">30s</span>
        <!-- Name Input -->
        <div id="lb-name-input-area">
          <p class="lb-qualify">🎉 TOP 10 入り！名前を登録</p>
          <div class="lb-input-row">
            <input id="lb-name" type="text" maxlength="8" placeholder="なまえ（8文字以内）" autocomplete="off" />
            <button id="lb-submit-btn" class="result-btn lb-submit">登録</button>
          </div>
        </div>
        <div class="result-buttons">
          <button id="game-replay" class="result-btn">RETRY</button>
          <button id="game-ranking-btn" class="result-btn result-btn-rank">🏆 RANKING</button>
          <button id="game-exit" class="result-btn result-btn-exit">EXIT</button>
        </div>
      </div>
    </div>

    <!-- ══════ In-Game Exit Button ══════ -->
    <button id="game-exit-ingame" class="game-exit-btn" aria-label="Exit game">✕</button>

    <!-- ══════ Leaderboard Panel ══════ -->
    <div id="leaderboard-panel">
      <div class="lb-inner">
        <div class="lb-header">
          <h2 class="lb-title">🏆 RANKING</h2>
          <button id="lb-close" class="lb-close-btn">✕</button>
        </div>
        <div class="lb-tabs">
          <button class="lb-tab active" data-tab="alltime">ALL TIME</button>
          <button class="lb-tab" data-tab="today">TODAY</button>
        </div>
        <div class="lb-list" id="lb-list"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="game.js?v=5"></script>
    <script src="leaderboard.js?v=5"></script>
    <script src="app.js?v=5"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(r => r.forEach(x => x.unregister()));
        caches.keys().then(k => k.forEach(c => caches.delete(c)));
      }
    </script>
  </body>
</html>
